# Legacy admin-local compose. The root ../docker-compose.yml is the canonical
# Silicon Ape Club local environment and includes all sibling services.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: siliconapeclub-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docspace
      POSTGRES_USER: docspace
      POSTGRES_PASSWORD: docspace123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: siliconapeclub-admin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: siliconapeclub-admin-rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: siliconapeclub-admin-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./siliconApeClub-server/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
      - rocketmq-broker-data:/home/rocketmq/store
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: siliconapeclub-admin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  siliconapeclub-server:
    build:
      context: ./siliconApeClub-server
    container_name: siliconapeclub-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - rocketmq-namesrv
      - rocketmq-broker
      - minio
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: docspace
      POSTGRES_USERNAME: docspace
      POSTGRES_PASSWORD: docspace123
      REDIS_HOST: redis
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      MINIO_ENDPOINT: http://minio:9000
      RETRIEVAL_BASE_URL: http://retrieval-service:8090
      RETRIEVAL_SERVICE_TOKEN: siliconapeclub-retrieval-dev-token
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    ports:
      - "8080:8080"

  retrieval-service:
    build:
      context: ../retrieval-service
    container_name: siliconapeclub-retrieval-service
    restart: unless-stopped
    depends_on:
      - postgres
      - siliconapeclub-server
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: docspace
      POSTGRES_USERNAME: docspace
      POSTGRES_PASSWORD: docspace123
      SILICONAPECLUB_SERVER_BASE_URL: http://siliconapeclub-server:8080
      RETRIEVAL_SERVICE_TOKEN: siliconapeclub-retrieval-dev-token
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      DASHSCOPE_EMBEDDING_MODEL: text-embedding-v4
      DASHSCOPE_EMBEDDING_DIMENSIONS: 1024
      DASHSCOPE_RERANK_ENDPOINT: https://dashscope.aliyuncs.com/compatible-api/v1/reranks
      DASHSCOPE_RERANK_MODEL: qwen3-rerank
    ports:
      - "8090:8090"

volumes:
  postgres-data:
  redis-data:
  rocketmq-broker-data:
  minio-data:
