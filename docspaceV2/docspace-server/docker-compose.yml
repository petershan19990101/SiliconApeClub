services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docspace
      POSTGRES_USER: docspace
      POSTGRES_PASSWORD: docspace123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: docspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: docspace-rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: docspace-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
      - rocketmq-broker-data:/home/rocketmq/store
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: docspace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  rocketmq-broker-data:
  minio-data:
